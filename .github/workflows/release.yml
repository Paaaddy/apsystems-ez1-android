name: Release

on:
  release:
    types: [published]

jobs:
  build-apk:
    name: Build & attach APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        id: build
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/keystore.jks"
            chmod 600 "$RUNNER_TEMP/keystore.jks"
            export KEYSTORE_FILE="$RUNNER_TEMP/keystore.jks"
            export KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
            export KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            export KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
            ./gradlew assembleRelease
            APK_SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          else
            ./gradlew assembleDebug
            APK_SRC=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          fi
          if [ -z "$APK_SRC" ]; then echo "ERROR: no APK found" && exit 1; fi
          APK_DEST="ez1-monitor-${TAG}.apk"
          cp "$APK_SRC" "$APK_DEST"
          echo "apk=$APK_DEST" >> "$GITHUB_OUTPUT"

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.build.outputs.apk }}" \
            --repo "$GITHUB_REPOSITORY"
