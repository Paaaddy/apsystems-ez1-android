name: Release

on:
  push:
    tags: ['v[0-9]*.[0-9]*.[0-9]*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.1.0)'
        required: true

jobs:
  build-apk:
    name: Build & attach APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - name: Build APKs
        id: build
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION_NAME="${TAG#v}"

          if ! [[ "$VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Tag must be vX.Y.Z (got $TAG)"
            exit 1
          fi

          IFS='.' read -r MAJ MIN PAT <<< "$VERSION_NAME"
          if (( MAJ > 999 || MIN > 999 || PAT > 999 )); then
            echo "ERROR: version components must be 0–999 (got $VERSION_NAME)"
            exit 1
          fi

          export ANDROID_VERSION_CODE=$(( MAJ * 1000000 + MIN * 1000 + PAT ))
          echo "versionName=$VERSION_NAME versionCode=$ANDROID_VERSION_CODE"

          ./gradlew assembleDebug -x lint
          DEBUG_SRC=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          if [ -z "$DEBUG_SRC" ]; then echo "ERROR: no debug APK found" && exit 1; fi
          DEBUG_DEST="ez1-monitor-v${VERSION_NAME}-debug.apk"
          cp "$DEBUG_SRC" "$DEBUG_DEST"
          echo "debug_apk=$DEBUG_DEST" >> "$GITHUB_OUTPUT"

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/keystore.jks"
            chmod 600 "$RUNNER_TEMP/keystore.jks"
            export KEYSTORE_FILE="$RUNNER_TEMP/keystore.jks"
            export KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
            export KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            export KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
            ./gradlew assembleRelease -x lint
            RELEASE_SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
            if [ -z "$RELEASE_SRC" ]; then echo "ERROR: no release APK found" && exit 1; fi
            RELEASE_DEST="ez1-monitor-v${VERSION_NAME}.apk"
            cp "$RELEASE_SRC" "$RELEASE_DEST"
            echo "release_apk=$RELEASE_DEST" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APKs to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload "$TAG" "${{ steps.build.outputs.debug_apk }}" \
            --repo "$GITHUB_REPOSITORY" --clobber
          if [ -n "${{ steps.build.outputs.release_apk }}" ]; then
            gh release upload "$TAG" "${{ steps.build.outputs.release_apk }}" \
              --repo "$GITHUB_REPOSITORY" --clobber
          fi
