name: Release

on:
  release:
    types: [published]

jobs:
  build-apk:
    name: Build & attach APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        id: build
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip component prefix (e.g. "ez1-monitor-v1.2.3" or "v1.2.3") → "1.2.3"
          VERSION_NAME="${TAG##*v}"

          # Validate semver format
          if ! [[ "$VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Tag must be vX.Y.Z (got $TAG)"
            exit 1
          fi

          # Validate component bounds to prevent versionCode collisions
          IFS='.' read -r MAJ MIN PAT <<< "$VERSION_NAME"
          if (( MAJ > 999 || MIN > 999 || PAT > 999 )); then
            echo "ERROR: version components must be 0–999 (got $VERSION_NAME)"
            exit 1
          fi

          export ANDROID_VERSION_CODE=$(( MAJ * 1000000 + MIN * 1000 + PAT ))
          echo "versionName=$VERSION_NAME versionCode=$ANDROID_VERSION_CODE"

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/keystore.jks"
            chmod 600 "$RUNNER_TEMP/keystore.jks"
            export KEYSTORE_FILE="$RUNNER_TEMP/keystore.jks"
            export KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
            export KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            export KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
            ./gradlew assembleRelease --build-cache
            APK_SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          else
            echo "WARNING: KEYSTORE_BASE64 not set — building debug APK. Updates will require reinstall."
            ./gradlew assembleDebug --build-cache
            APK_SRC=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          fi

          if [ -z "$APK_SRC" ]; then echo "ERROR: no APK found" && exit 1; fi
          APK_DEST="ez1-monitor-v${VERSION_NAME}.apk"
          cp "$APK_SRC" "$APK_DEST"
          echo "apk=$APK_DEST" >> "$GITHUB_OUTPUT"

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.build.outputs.apk }}" \
            --repo "$GITHUB_REPOSITORY"
