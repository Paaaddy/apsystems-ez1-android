name: Release

on:
  pull_request:
    types: [closed]
    branches: [master]

concurrency:
  group: release-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.head_ref, 'release/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract and validate version from branch name
        id: version
        run: |
          VERSION="${GITHUB_HEAD_REF#release/}"
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid version format '$VERSION'. Expected vX.Y.Z"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v6

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore.jks"
          chmod 600 "$RUNNER_TEMP/keystore.jks"

      - name: Build signed release APK
        id: build
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [[ -z "$APK" ]]; then
            echo "ERROR: No APK found after assembleRelease"
            exit 1
          fi
          echo "apk=$APK" >> "$GITHUB_OUTPUT"

      - name: Verify APK signature
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          if [[ -z "$APKSIGNER" ]]; then
            echo "ERROR: apksigner not found in $ANDROID_HOME/build-tools"
            exit 1
          fi
          "$APKSIGNER" verify --print-certs "${{ steps.build.outputs.apk }}" || exit 1
          echo "APK signature verified"

      - name: Generate SHA256 checksum
        run: sha256sum "${{ steps.build.outputs.apk }}" > "${{ steps.build.outputs.apk }}.sha256"

      - name: Create and push tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag "${{ steps.version.outputs.version }}" || echo "tag already exists"
          git push origin "${{ steps.version.outputs.version }}" || echo "tag already pushed"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/*.sha256
          generate_release_notes: true
