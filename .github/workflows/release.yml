name: Release

on:
  push:
    branches: [master]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v3

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -o '"[^"]*"' | tr -d '"')
          TAG="v${VERSION}+${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build APK
        id: build
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/keystore.jks"
            chmod 600 "$RUNNER_TEMP/keystore.jks"
            export KEYSTORE_FILE="$RUNNER_TEMP/keystore.jks"
            export KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
            export KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            export KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
            ./gradlew assembleRelease
            APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          else
            ./gradlew assembleDebug
            APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          fi
          if [ -z "$APK" ]; then echo "ERROR: no APK found" && exit 1; fi
          echo "apk=$APK" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.build.outputs.apk }}" \
            --title "EZ1 Monitor ${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --repo "$GITHUB_REPOSITORY"
