name: Build & Test

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'version.txt'
      - '.release-please-manifest.json'
      - 'obtainium.json'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'version.txt'
      - '.release-please-manifest.json'
      - 'obtainium.json'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-workflows:
    name: Lint workflows
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/actionlint@v1.7.12

  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Test & assemble
        run: ./gradlew testDebugUnitTest assembleDebug --build-cache

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
